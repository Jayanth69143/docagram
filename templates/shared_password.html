{% extends "base_mysql.html" %}

{% block title %}Enter Password{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Password Required</h3>
                </div>
                <div class="card-body">
                    <p>This shared file requires a password to access.</p>
                    <form method="POST">
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Access File</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
